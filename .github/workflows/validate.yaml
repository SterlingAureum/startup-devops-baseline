name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint demo-api
        run: helm lint apps/demo-api/helm

      - name: Helm template demo-api local
        run: helm template demo-api apps/demo-api/helm > /tmp/demo-api-rendered.yaml

      - name: Helm lint demo-api aws-dev
        run: helm lint apps/demo-api/helm -f apps/demo-api/helm/values-aws-dev.yaml

      - name: Helm template demo-api aws-dev
        run: helm template demo-api apps/demo-api/helm -f apps/demo-api/helm/values-aws-dev.yaml > /tmp/demo-api-aws-dev-rendered.yaml

      - name: Docker build validation
        run: docker build -t demo-api-ci-test apps/demo-api
