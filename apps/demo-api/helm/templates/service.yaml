{{- $fullName := include "demo-api.fullname" . -}}
{{- $trafficRoutingEnabled := and .Values.rollout.enabled .Values.rollout.strategy.canary.trafficRouting.nginx.enabled -}}
{{- if $trafficRoutingEnabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.rollout.strategy.canary.stableService }}
  labels:
    {{- include "demo-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "demo-api.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.rollout.strategy.canary.canaryService }}
  labels:
    {{- include "demo-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "demo-api.selectorLabels" . | nindent 4 }}
{{- else }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "demo-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "demo-api.selectorLabels" . | nindent 4 }}
{{- end }}
