apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: application-spot-fis
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  template:
    metadata:
      labels:
        workload: application
        capacity-owner: karpenter
        capacity-tier: spot-fis
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: application-fis
      taints:
        - key: dedicated
          value: application-spot-fis
          effect: NoSchedule
      expireAfter: 24h
      terminationGracePeriod: 2m
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: kubernetes.io/os
          operator: In
          values:
            - linux
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - spot
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values:
            - c
            - m
            - r
        - key: karpenter.k8s.aws/instance-generation
          operator: Gte
          values:
            - "6"
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values:
            - "2"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    budgets:
      - nodes: "1"
  limits:
    cpu: "4"
    memory: 32Gi
    nodes: 2
  weight: 1
