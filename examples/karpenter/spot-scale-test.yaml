apiVersion: v1
kind: Namespace
metadata:
  name: karpenter-spot-smoke
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-spot-scale-test
  namespace: karpenter-spot-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: karpenter-spot-scale-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karpenter-spot-scale-test
    spec:
      nodeSelector:
        karpenter.sh/nodepool: application-spot
        workload: application
      tolerations:
        - key: dedicated
          operator: Equal
          value: application-spot
          effect: NoSchedule
      containers:
        - name: nginx
          image: public.ecr.aws/docker/library/nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 750m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      terminationGracePeriodSeconds: 30
