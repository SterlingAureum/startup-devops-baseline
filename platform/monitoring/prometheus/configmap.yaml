apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: startup-devops-baseline
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: demo-api-stable
        metrics_path: /metrics
        static_configs:
          - targets:
              - demo-api-stable.startup-apps.svc.cluster.local:80

      - job_name: demo-api-canary
        metrics_path: /metrics
        static_configs:
          - targets:
              - demo-api-canary.startup-apps.svc.cluster.local:80
